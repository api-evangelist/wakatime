specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: WakaTime
providerId: wakatime
created: '2026-05-30'
modified: '2026-05-30'
reconciled: true
tags:
  - Developer Productivity
  - Time Tracking
  - Coding Analytics
  - Subscription
  - Per-Developer
description: >-
  WakaTime offers tiered per-user subscriptions on the individual side (Free, Basic, Premium) and
  per-developer subscriptions on the company side (Team, Business). Pricing scales primarily on
  dashboard history retention, number of programming goals, private leaderboard size, and access
  to premium integrations. All plans share the same underlying API surface; quotas are enforced
  by feature gating (e.g. dashboard history) and by the global API rate limit, not by per-call
  metering. Annual subscriptions discount the monthly price by roughly 8%.
sources:
  - https://wakatime.com/pricing
  - https://wakatime.com/developers
plans:

  - id: wakatime-free
    name: Free
    type: freemium
    description: Free tier for individual developers — full API access, 1-week dashboard history, single coding goal, public leaderboard.
    entries:
      - label: Monthly subscription
        name: monthly_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: '1'
        price: '$0'
        userMultiplied: false
      - label: Dashboard history
        name: dashboard_history
        type: quota
        metric: weeks
        limit: 1
        timeFrame: usage
        geo: global
        unit: '1'
        price: 'included'
        userMultiplied: false
      - label: Programming goals
        name: programming_goals
        type: quota
        metric: goal
        limit: 1
        timeFrame: usage
        geo: global
        unit: '1'
        price: 'included'
        userMultiplied: false
