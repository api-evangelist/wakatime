                      percent_calculated: 1
                      range: *id001
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /users/current/heartbeats:
    get:
      operationId: listHeartbeats
      summary: List Heartbeats
      description: Returns the authenticated user's heartbeats for a given day.
      tags: [Heartbeats]
