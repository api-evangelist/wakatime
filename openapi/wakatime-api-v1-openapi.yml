components:

  parameters:
    UserPath:
      name: user
      in: path
      required: true
      description: User id, username, or "current".
      schema: {type: string}
      example: example
    ProjectPath:
      name: project
      in: path
      required: true
      description: Project name.
      schema: {type: string}
      example: example
    OrgPath:
      name: org
      in: path
      required: true
      description: Organization id.
      schema: {type: string}
      example: example
    DashboardPath:
      name: dashboard
      in: path
      required: true
      description: Dashboard id.
      schema: {type: string}
      example: example
    MemberPath:
      name: member
      in: path
      required: true
      description: Org member id.
      schema: {type: string}
      example: example
    DateQueryRequired:
      name: date
      in: query
      required: true
      description: Day to query (YYYY-MM-DD).
      schema: {type: string, format: date}
      example: '2026-05-30'
    ProjectQuery:
      name: project
      in: query
      description: Filter by project name.
      schema: {type: string}
      example: example
    BranchesQuery:
      name: branches
      in: query
      description: Comma-separated list of git branches to include.
      schema: {type: string}
      example: example
    TimeoutQuery:
      name: timeout
      in: query
      description: Keystroke timeout in minutes (defaults to user's account setting).
      schema: {type: integer, minimum: 1, maximum: 60}
      example: 1
    WritesOnlyQuery:
      name: writes_only
      in: query
      description: Whether to only include time editing (writing) files.
      schema: {type: boolean}
      example: true
    TimezoneQuery:
      name: timezone
      in: query
      description: Timezone to use (defaults to the user's profile timezone).
      schema: {type: string, example: America/Los_Angeles}
      example: America/Los_Angeles
    SliceByQuery:
      name: slice_by
      in: query
      description: Slice durations by entity, language, dependencies, os, editor, category, or machine.
      schema:
        type: string
        enum: [entity, language, dependencies, os, editor, category, machine]
      example: entity
    RangeQuery:
      name: range
      in: query
      description: Range filter (last_7_days, last_30_days, last_6_months, last_year, all_time).
      schema:
        type: string
        enum: [last_7_days, last_30_days, last_6_months, last_year, all_time]
      example: last_7_days

  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authorization code flow.
      flows:
        authorizationCode:
          authorizationUrl: https://wakatime.com/oauth/authorize
          tokenUrl: https://wakatime.com/oauth/token
          refreshUrl: https://wakatime.com/oauth/token
          scopes:
            email: Read user email.
            read_summaries: Read coding-activity summaries.
            read_stats: Read aggregate stats.
            read_goals: Read coding goals.
            read_heartbeats: Read raw heartbeats.
            write_heartbeats: Send heartbeats.
            read_orgs: Read organization data.
            write_orgs: Modify organization data.
        implicit:
          authorizationUrl: https://wakatime.com/oauth/authorize
          scopes:
            email: Read user email.
            read_summaries: Read coding-activity summaries.
            read_stats: Read aggregate stats.
            read_goals: Read coding goals.
            read_heartbeats: Read raw heartbeats.
            write_heartbeats: Send heartbeats.
            read_orgs: Read organization data.
            write_orgs: Modify organization data.
    apiKey:
      type: http
      scheme: basic
      description: HTTP Basic with the WakaTime API key as the username. Alternatively, pass `?api_key=...` as a query parameter.
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth access token in the Authorization header as `Bearer waka_tok_...`.

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
          example: example
        errors:
          type: object
          additionalProperties: true

          example: {}
    User:
      type: object
      description: The authenticated WakaTime user profile.
      x-schema-source: documentation
      x-source-url: https://wakatime.com/developers
      properties:
        id: {type: string, example: 5f8a2c7f-8b3a-4c2c-9b3f-1d2c4f5b6a7c}
        username: {type: string, nullable: true, example: kinlane}
        display_name: {type: string, example: Kin Lane}
        full_name: {type: string, nullable: true, example: Kin Lane}
        email: {type: string, format: email, nullable: true, example: support@example.com}
        photo: {type: string, format: uri, example: https://wakatime.com/photo/5f8a2c7f-8b3a-4c2c-9b3f-1d2c4f5b6a7c}
        photo_public: {type: boolean, example: true}
        is_email_public: {type: boolean, example: true}
        is_email_confirmed: {type: boolean, example: true}
        timezone: {type: string, example: America/Los_Angeles}
        last_heartbeat_at: {type: string, format: date-time, nullable: true, example: '2026-05-30T12:34:56Z'}
        last_plugin: {type: string, nullable: true, example: vscode-wakatime/24.0.0 vscode-wakatime/24.0.0}
        last_plugin_name: {type: string, nullable: true, example: vscode}
        last_project: {type: string, nullable: true, example: wakatime-cli}
        plan: {type: string, enum: [free, basic, premium, team, business], example: free}
        bio: {type: string, nullable: true, example: Founder of API Evangelist.}
        location: {type: string, nullable: true, example: 'Hermosa Beach, CA'}
        languages_used_public: {type: boolean, example: true}
        logged_time_public: {type: boolean, example: true}
        website: {type: string, format: uri, nullable: true, example: https://wakatime.com}
        human_readable_website: {type: string, nullable: true, example: wakatime.com}
        wonderfuldev_username: {type: string, nullable: true, example: kinlane}
        github_username: {type: string, nullable: true, example: kinlane}
        twitter_username: {type: string, nullable: true, example: kinlane}
        linkedin_username: {type: string, nullable: true, example: kinlane}
        created_at: {type: string, format: date-time, example: '2026-05-30T12:34:56Z'}
        modified_at: {type: string, format: date-time, nullable: true, example: '2026-05-30T12:34:56Z'}

    PublicUser:
      allOf:
      - $ref: '#/components/schemas/User'

    AllTimeSinceToday:
      type: object
      properties:
        total_seconds: {type: number, format: float, example: 4}
        text: {type: string, example: "1,234 hrs 5 mins"}
        decimal: {type: string, example: "1234.08"}
        digital: {type: string, example: "1234:05"}
        is_up_to_date: {type: boolean, example: '2026-05-30T12:34:56Z'}
        percent_calculated: {type: integer, example: 1}
        range:
          type: object
          properties:
            start: {type: string, format: date}
            end: {type: string, format: date}
            start_date: {type: string, format: date}
            end_date: {type: string, format: date}
            start_text: {type: string}
            end_text: {type: string}
            timezone: {type: string}
          example: *id001

    HeartbeatInput:
      type: object
      description: A single coding heartbeat as sent by an editor plugin.
      required: [entity, type, time]
      properties:
        entity: {type: string, description: "File path, domain, or app name.", example: /Users/kin/code/wakatime-cli/main.go}
        type:
          type: string
          enum: [file, domain, app]
          example: file
        category:
          type: string
          enum: [coding, building, indexing, debugging, browsing, running tests, writing tests, manual testing, code reviewing, designing, communicating, meeting, learning, researching, writing docs, 
              ai coding]
          example: coding
        time: {type: number, format: float, description: "Unix epoch seconds with milliseconds.", example: 1.0}
        project: {type: string, nullable: true, example: wakatime-cli}
