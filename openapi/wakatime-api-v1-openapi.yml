          example: *id002
        lines: {type: integer, nullable: true, example: 1}
        line_additions: {type: integer, nullable: true, example: 1}
        line_deletions: {type: integer, nullable: true, example: 1}
        lineno: {type: integer, nullable: true, example: 1}
        cursorpos: {type: integer, nullable: true, example: 1}
        is_write: {type: boolean, example: true}

    Heartbeat:
