naftiko: 1.0.0-alpha2
info:
  label: WakaTime API — Users
  description: 'WakaTime API — Users. 2 operations. Lead operation: Get Current User. Self-contained Naftiko capability covering one WakaTime business surface.'
  tags:
  - WakaTime
  - Developer Productivity
  - Users
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    WAKATIME_API_KEY: WAKATIME_API_KEY
capability:
  consumes:
  - type: http
    namespace: wakatime-api-v1-users
    baseUri: https://wakatime.com/api/v1
    description: WakaTime API — Users business capability. Self-contained, no shared references.
    authentication:
      type: basic
      username: '{{env.WAKATIME_API_KEY}}'
      password: ''
    resources:
    - name: users-current
      path: /users/current
      operations:
      - name: getCurrentUser
        method: GET
        description: Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-user
      path: /users/{user}
      operations:
      - name: getUser
        method: GET
        description: Get User
        inputParameters:
        - name: user
          in: path
          type: string
          required: true
          description: User id, username, or "current".
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: wakatime-api-v1-users-rest
    port: 8080
    description: REST adapter for WakaTime API — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users/current
      name: users-current
      description: REST surface for /users/current.
      operations:
      - method: GET
        name: getCurrentUser
        description: Get Current User
        call: wakatime-api-v1-users.getCurrentUser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user}
      name: users-user
      description: REST surface for /users/{user}.
      operations:
      - method: GET
        name: getUser
        description: Get User
        call: wakatime-api-v1-users.getUser
        with:
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wakatime-api-v1-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for WakaTime API — Users. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-current-user
      description: Get Current User
      hints:
        destructive: false
        idempotent: true
        readOnly: true
      call: wakatime-api-v1-users.getCurrentUser
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get User
      hints:
        destructive: false
        idempotent: true
        readOnly: true
      call: wakatime-api-v1-users.getUser
      with:
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
