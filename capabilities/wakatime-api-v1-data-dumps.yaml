naftiko: 1.0.0-alpha2
info:
  label: WakaTime API — Data Dumps
  description: 'WakaTime API — Data Dumps. 2 operations. Lead operation: List Data Dumps. Self-contained Naftiko capability covering one WakaTime business surface.'
  tags:
  - WakaTime
  - Developer Productivity
  - Data Dumps
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    WAKATIME_API_KEY: WAKATIME_API_KEY
capability:
  consumes:
  - type: http
    namespace: wakatime-api-v1-data-dumps
    baseUri: https://wakatime.com/api/v1
    description: WakaTime API — Data Dumps business capability. Self-contained, no shared references.
    authentication:
      type: basic
      username: '{{env.WAKATIME_API_KEY}}'
      password: ''
    resources:
    - name: users-current-data-dumps
      path: /users/current/data_dumps
      operations:
      - name: listDataDumps
        method: GET
        description: List Data Dumps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createDataDump
        method: POST
        description: Create Data Dump
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: wakatime-api-v1-data-dumps-rest
    port: 8080
    description: REST adapter for WakaTime API — Data Dumps. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users/current/data-dumps
      name: users-current-data-dumps
      description: REST surface for /users/current/data_dumps.
      operations:
      - method: GET
        name: listDataDumps
        description: List Data Dumps
        call: wakatime-api-v1-data-dumps.listDataDumps
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createDataDump
        description: Create Data Dump
        call: wakatime-api-v1-data-dumps.createDataDump
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wakatime-api-v1-data-dumps-mcp
    port: 9090
    transport: http
    description: MCP adapter for WakaTime API — Data Dumps. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-data-dumps
      description: List Data Dumps
      hints:
        destructive: false
        idempotent: true
        readOnly: true
      call: wakatime-api-v1-data-dumps.listDataDumps
      outputParameters:
      - type: object
        mapping: $.
    - name: create-data-dump
      description: Create Data Dump
      hints:
        destructive: false
        idempotent: false
        readOnly: false
      call: wakatime-api-v1-data-dumps.createDataDump
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
