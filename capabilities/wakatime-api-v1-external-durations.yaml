          in: query
          type: string
          required: true
          description: Day to query (YYYY-MM-DD).
        - name: project
          in: query
          type: string
          required: false
          description: Filter by project name.
        - name: timezone
          in: query
          type: string
          required: false
          description: Timezone to use (defaults to the user's profile timezone).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createExternalDuration
        method: POST
        description: Create External Duration
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-current-external-durations-bulk
      path: /users/current/external_durations.bulk
      operations:
      - name: createExternalDurationsBulk
        method: POST
        description: Create External Durations Bulk
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteExternalDurationsBulk
        method: DELETE
        description: Delete External Durations Bulk
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
