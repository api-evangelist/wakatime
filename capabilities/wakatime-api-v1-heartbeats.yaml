        call: wakatime-api-v1-heartbeats.createHeartbeatsBulk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteHeartbeatsBulk
        description: Delete Heartbeats Bulk
        call: wakatime-api-v1-heartbeats.deleteHeartbeatsBulk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
